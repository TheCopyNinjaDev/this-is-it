services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST_DOCKER:-host.docker.internal}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-this-is-it}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  bot:
    build:
      context: ./bot
    env_file:
      - ./.env
    environment:
      BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      BACKEND_BASE_URL: http://backend:8000
      BACKEND_BEARER_TOKEN: ${TELEGRAM_BOT_TOKEN}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
